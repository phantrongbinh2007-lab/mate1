<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vua Cờ Xuyên Việt: Hành Trình Chiếu Hết</title>

    <!-- Chessboard CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <h1>Vua Cờ Xuyên Việt: Hành Trình Chiếu Hết</h1>
        <p>Tìm cách chiếu hết trong 1 nước để di chuyển.</p>

        <div id="timer-display" class="timer-display">
            Chọn chế độ để bắt đầu
        </div>
        <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="false" title="Bật/tắt âm thanh">
            🔊 Âm thanh: Bật
        </button>
    </div>

    <!-- Chọn chế độ -->
    <div id="mode-select" class="mode-select">
        <h2>Chọn chế độ chơi</h2>
        <div class="mode-cards">
            <button type="button" id="mode-practice" class="mode-card mode-practice">
                <strong>Luyện tập</strong>
                <span>Không tính giờ · Có gợi ý &amp; bỏ qua · Không xếp hạng</span>
            </button>
            <button type="button" id="mode-challenge" class="mode-card mode-challenge">
                <strong>Thi đấu</strong>
                <span>Tính giờ · Lưu kỷ lục · Dùng gợi ý/bỏ qua sẽ không được xếp hạng</span>
            </button>
        </div>
        <div class="mode-leaderboard">
            <h3>🏆 Bảng vàng kỷ lục</h3>
            <ul id="leaderboard-list-home">
                <li>Đang tải...</li>
            </ul>
        </div>
    </div>

    <div class="game-container" id="game-container" hidden>
        
        <!-- Leaderboard -->
        <div class="leaderboard-section">
            <h3>🏆 BẢNG VÀNG KỶ LỤC</h3>
            <ul id="leaderboard-list">
                <li>Đang tải...</li>
            </ul>
        </div>

        <!-- Map -->
        <div class="map-section">
            <div class="map-wrapper">
                <img src="assets/map.png" alt="Bản đồ Việt Nam" id="vn-map">
                <img src="assets/car.png" alt="Xe cute" id="cute-car">
            </div>

            <div class="province-info">
                <h3>Vị trí hiện tại: <span id="province-name">Đang tải...</span></h3>
                <p id="province-fact" class="province-fact">Đang khám phá Việt Nam...</p>
            </div>
        </div>

        <!-- Chessboard -->
        <div class="board-section">
            <div id="board" class="board-responsive"></div>

            <div class="controls">
                <p id="status-message" class="status-msg">Đang tải thế trận...</p>
                <div id="help-buttons" class="help-buttons">
                    <button type="button" id="hint-btn">💡 Gợi ý</button>
                    <button type="button" id="skip-btn">⏭ Bỏ qua bài này</button>
                </div>
                <button id="next-btn" style="display:none;">Lên xe đi tiếp!</button>

                <!-- Save record -->
                <div id="save-record-form" style="display:none; margin-top: 15px;">
                    <input type="text" id="player-name" placeholder="Nhập tên của bạn..." maxlength="20">
                    <button id="save-btn">Lưu Kỷ Lục</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
